<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR Service</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<header>
  <h1>📷 OCR Service</h1>
  <p>Extract text from images and save to local file</p>
</header>

<div class="card">

  <div>
    <label for="title-input">Note title</label>
    <input type="text" id="title-input" placeholder="OCR – today's date (default)" />
  </div>

  <div>
    <label>Images</label>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" multiple capture="environment" />
      <div class="icon">🖼️</div>
      <p><strong>Tap to choose</strong> or drag &amp; drop</p>
      <p>JPEG, PNG, WebP — up to 20 MB each</p>
    </div>
    <div id="preview-grid" style="margin-top:10px;"></div>
  </div>

  <div>
    <label>Save to</label>
    <div class="outputs" id="outputs">
      <button type="button" class="output-chip" data-value="file">
        <span class="chip-indicator"></span> 📄 Local file
      </button>
      <button type="button" class="output-chip" data-value="notion">
        <span class="chip-indicator"></span> 🔲 Notion
      </button>
      <button type="button" class="output-chip" data-value="notes">
        <span class="chip-indicator"></span> 🍎 Apple Notes
      </button>
    </div>
  </div>

  <button type="submit" id="submit-btn" disabled>
    Extract Text
  </button>
  <div class="spinner" id="spinner"></div>

</div>

<div id="result">
  <div class="result-card">
    <h2>Results</h2>
    <div class="destination-status" id="destination-status"></div>
    <pre id="text-output"></pre>
    <button class="copy-btn" id="copy-btn">Copy text</button>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
